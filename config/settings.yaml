channel:
  name: "Mindrift"
  tagline: "Tiny animals explaining human problems."

content:
  max_words: 45                 # ~20 seconds at natural pace
  max_video_duration_sec: 20    # Default episode length
  max_long_duration_sec: 40     # Only when user says "make it longer"

voice:
  model_id: "eleven_turbo_v2_5"
  speed_multiplier: 1.0        # Natural pace
  # Character-specific voices
  characters:
    orange_cat:
      voice_id: "Xb7hH8MSUJpSbSDYk0k2"  # Alice - Clear, Engaging (sassy fits cat)
      stability: 0.45
      similarity_boost: 0.80
      style: 0.40
    golden_retriever:
      voice_id: "JBFqnCBsd6RMkjVDRZzb"   # George - Warm Storyteller (earnest fits retriever)
      stability: 0.60
      similarity_boost: 0.80
      style: 0.30
    senior_dog:
      voice_id: "pqHfZKP75CvOlQylNhV4"   # Bill - Wise, Mature, Balanced
      stability: 0.70
      similarity_boost: 0.80
      style: 0.20
    kitten:
      voice_id: "FGY2WhTYpPnrIDTdsKH5"   # Laura - Enthusiastic, Quirky
      stability: 0.40
      similarity_boost: 0.75
      style: 0.50

video:
  resolution: "1080x1920"
  fps: 30

audio:
  target_lufs: -16
  ambient_volume_db: -14
  bass_boost_db: 2
  bass_freq_hz: 120
  high_cut_freq_hz: 10000
  compression_ratio: 2.0
  compression_threshold_db: -20

seo:
  default_tags:
    - "pets"
    - "funny pets"
    - "cat comedy"
    - "dog comedy"
    - "pet POV"
    - "animals explaining"
    - "funny animals"
    - "shorts"
    - "mindrift"

platforms:
  youtube_shorts: true
  instagram_reels: false
  tiktok: false
