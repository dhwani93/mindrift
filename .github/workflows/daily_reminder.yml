name: Mindrift — Daily Reminder

on:
  schedule:
    # 9 AM PDT = 4 PM UTC (California time)
    - cron: '0 16 * * *'

jobs:
  remind:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install requests
      - name: Send Telegram reminder
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 -c "from utils.telegram_bot import TelegramBot; TelegramBot().send_reminder()"
