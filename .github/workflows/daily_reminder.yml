name: Mindrift — Daily Seeds

on:
  schedule:
    # 9 AM PDT = 4 PM UTC
    - cron: '0 16 * * *'

jobs:
  send-seeds:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt

      - name: Generate and send episode seeds
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 -c "
          from agents.seed_generator import SeedGenerator
          from utils.telegram_bot import TelegramBot
          gen = SeedGenerator()
          seeds = gen.generate_seeds()
          formatted = gen.format_for_telegram(seeds)
          TelegramBot().send_seeds(formatted)
          print('Seeds sent!')
          "
