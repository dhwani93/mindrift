name: Mindrift — Daily Pipeline

on:
  schedule:
    # 12 PM PDT = 7 PM UTC (California time) — 3hr after reminder
    - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      thought_seed:
        description: 'Optional: Your thought of the day (leave empty for auto)'
        required: false
        type: string

jobs:
  produce:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours — waits for Telegram approval indefinitely

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - run: pip install -r requirements.txt
      - run: python3 data/init_db.py

      - name: Write seed from workflow input
        if: inputs.thought_seed != ''
        run: echo "${{ inputs.thought_seed }}" > data/daily_seed.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          KLING_API_KEY: ${{ secrets.KLING_API_KEY }}
          KLING_API_SECRET: ${{ secrets.KLING_API_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
        run: python3 main.py --date $(date +%Y-%m-%d)

      - name: Upload output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-run-${{ github.run_id }}
          path: output/
          retention-days: 7
