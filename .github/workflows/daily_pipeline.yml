name: Paws & Opinions — Daily Pipeline

on:
  schedule:
    # 3 videos/day (PDT / California):
    # 9 AM PDT = 4 PM UTC
    - cron: '0 16 * * *'
    # 1 PM PDT = 8 PM UTC
    - cron: '0 20 * * *'
    # 6 PM PDT = 1 AM UTC (next day)
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      thought_seed:
        description: 'Optional: topic seed'
        required: false
        type: string

jobs:
  produce:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - run: pip install -r requirements.txt
      - run: python3 data/init_db.py

      - name: Write seed from workflow input
        if: inputs.thought_seed != ''
        run: echo "${{ inputs.thought_seed }}" > data/daily_seed.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
        run: |
          # Determine slot — use RANGES to handle GitHub cron delays
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SLOT="morning"
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" -ge 14 ] && [ "$HOUR" -le 18 ]; then
              SLOT="morning"
            elif [ "$HOUR" -ge 19 ] && [ "$HOUR" -le 23 ]; then
              SLOT="midday"
            else
              SLOT="evening"
            fi
          fi
          # Use PDT date for consistency across all slots
          DATE=$(TZ=America/Los_Angeles date +%Y-%m-%d)
          echo "Slot: $SLOT | Date: $DATE"
          python3 main.py --date $DATE --slot $SLOT

      - name: Persist data files
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/series_tracker.json data/life_timeline.json data/daily_story.json data/era_topics.json data/learned_preferences.json data/trending_seeds.json
          git diff --staged --quiet || git commit -m "Update data files [automated]"
          git push || true

      - name: Upload output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-run-${{ github.run_id }}
          path: output/
          retention-days: 7
