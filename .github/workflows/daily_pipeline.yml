name: Paws & Opinions — Daily Pipeline

on:
  schedule:
    # 3 videos/day at optimal posting times (PDT / California):
    # 9 AM PDT = 4 PM UTC
    - cron: '0 16 * * *'
    # 1 PM PDT = 8 PM UTC
    - cron: '0 20 * * *'
    # 6 PM PDT = 1 AM UTC (next day)
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      thought_seed:
        description: 'Optional: Your thought of the day (leave empty for auto)'
        required: false
        type: string

jobs:
  produce:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # 15 min auto-approve + generation time

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - run: pip install -r requirements.txt
      - run: python3 data/init_db.py

      - name: Write seed from workflow input
        if: inputs.thought_seed != ''
        run: echo "${{ inputs.thought_seed }}" > data/daily_seed.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

          FAL_KEY: ${{ secrets.FAL_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
        run: |
          # Determine slot based on UTC hour
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "16" ]; then
            SLOT="morning"
          elif [ "$HOUR" = "20" ]; then
            SLOT="midday"
          else
            SLOT="evening"
          fi
          python3 main.py --date $(date +%Y-%m-%d) --slot $SLOT

      - name: Upload output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-run-${{ github.run_id }}
          path: output/
          retention-days: 7
