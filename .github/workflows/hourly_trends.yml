name: Paws & Opinions — Hourly Trend Scanner

on:
  # DISABLED — was failing every hour, wasting Actions minutes
  # schedule:
  #   - cron: '0 * * * *'
  workflow_dispatch:  # Manual trigger only

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt

      - name: Scan trends
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 -c "from agents.trend_scanner import TrendScanner; TrendScanner().run()"

      - name: Commit trending seeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/trending_seeds.json
          git diff --staged --quiet || git commit -m "Update trending seeds [automated]"
          git push
